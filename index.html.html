<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi App Realtime Firebase</title>
  <style>
    /* --- Estilos generales --- */
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    #loading {
      color: #888;
      text-align: center;
      margin: 20px 0;
    }
    #dataList {
      margin-top: 20px;
    }
    .item {
      background: #fff;
      border-radius: 8px;
      padding: 15px;
      margin: 10px 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      word-break: break-word;
    }
    button {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    input {
      width: calc(100% - 30px);
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <h1>Datos Compartidos</h1>

  <!-- Formulario para añadir datos -->
  <input type="text" id="nuevoMensaje" placeholder="Escribe un mensaje">
  <button id="btnAgregar">Agregar mensaje</button>

  <div id="loading">Cargando datos…</div>
  <div id="dataList"></div>

  <script type="module">
    // --- Importar Firebase ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
    import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

    // --- Configuración de Firebase ---
    const firebaseConfig = {
      apiKey: "AIzaSyABfITYDF1oX0ujjqqOVVK94E1ZTCoTT8A",
      authDomain: "reparacion-73191.firebaseapp.com",
      databaseURL: "https://reparacion-73191-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "reparacion-73191",
      storageBucket: "reparacion-73191.firebasestorage.app",
      messagingSenderId: "1040606956408",
      appId: "1:1040606956408:web:9a62c3b3d3c4134b75d68d",
      measurementId: "G-TQ7BTWSE7H"
    };

    // --- Inicializar Firebase ---
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getDatabase(app);

    // --- Referencia a la colección en Realtime DB ---
    const dataRef = ref(db, 'datosCompartidos');

    // --- Elementos del DOM ---
    const dataList = document.getElementById('dataList');
    const loading = document.getElementById('loading');
    const btnAgregar = document.getElementById('btnAgregar');
    const nuevoMensaje = document.getElementById('nuevoMensaje');

    // --- Función para mostrar datos ---
    function mostrarDatos(snapshot) {
      dataList.innerHTML = '';
      if (snapshot.exists()) {
        const datos = snapshot.val();
        Object.keys(datos).forEach(key => {
          const div = document.createElement('div');
          div.className = 'item';
          div.textContent = `[${datos[key].fecha}] ${datos[key].mensaje}`;
          dataList.appendChild(div);
        });
      } else {
        dataList.innerHTML = '<div>No hay datos todavía.</div>';
      }
      loading.style.display = 'none';
    }

    // --- Leer datos en tiempo real ---
    onValue(dataRef, snapshot => {
      mostrarDatos(snapshot);
    }, error => {
      console.error('Error leyendo la DB:', error);
      loading.textContent = 'Error al cargar los datos.';
    });

    // --- Agregar un nuevo mensaje ---
    btnAgregar.addEventListener('click', () => {
      const mensaje = nuevoMensaje.value.trim();
      if (!mensaje) return alert("Escribe un mensaje antes de agregarlo.");
      const nuevoDatoRef = push(dataRef);
      set(nuevoDatoRef, {
        mensaje: mensaje,
        fecha: new Date().toLocaleString()
      }).then(() => {
        nuevoMensaje.value = '';
      }).catch(error => {
        console.error('Error al agregar dato:', error);
      });
    });
  </script>
</body>
</html>
