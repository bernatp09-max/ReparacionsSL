<style>
/* ==== RESET & VARIABLES ==== */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0e0f11;
  --bg2:#16181c;
  --bg3:#1e2127;
  --accent:#f97316;
  --accent2:#fbbf24;
  --text:#f0ede8;
  --muted:#8a8f9e;
  --border:#2a2d35;
  --green:#4ade80;
  --red:#f87171;
  --blue:#60a5fa;
  --radius:14px;
  --radius-sm:8px;
}
/* ==== BODY ==== */
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;}
h1,h2,h3{font-family:'Syne',sans-serif;}
/* ==== NAV ==== */
.nav{display:flex;align-items:center;justify-content:space-between;padding:18px 24px 0;margin-bottom:24px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;letter-spacing:-1px;}
.logo-text span{color:var(--accent);}
.sync-badge{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:5px 12px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s;}
.sync-dot.ok{background:var(--green);}
.sync-dot.syncing{background:var(--accent2);animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.nav-tabs{display:flex;gap:4px;background:var(--bg2);border-radius:12px;padding:4px;border:1px solid var(--border);}
.nav-tab{padding:7px 16px;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--muted);transition:all .2s;white-space:nowrap;}
.nav-tab.active{background:var(--accent);color:#fff;font-weight:700;}
.nav-tab:hover:not(.active){color:var(--text);background:var(--bg3);}
/* ==== SECTIONS ==== */
.section{display:none;padding:0 24px 32px;animation:fadeUp .25s ease;}
.section.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
/* ==== METRICS ==== */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden;transition:transform .2s;}
.metric-card:hover{transform:translateY(-2px);}
.metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:0.6;}
.metric-card.green::before{background:var(--green);}
.metric-card.blue::before{background:var(--blue);}
.metric-card.amber::before{background:var(--accent2);}
.metric-icon{font-size:22px;margin-bottom:10px;}
.metric-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.metric-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-1px;}
.metric-value.green{color:var(--green);}
.metric-value.blue{color:var(--blue);}
.metric-value.amber{color:var(--accent2);}
/* ==== TABLES ==== */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.table-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);}
.table-title{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;text-align:left;font-weight:500;background:var(--bg3);}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}
.empty{text-align:center;color:var(--muted);padding:3rem!important;}
/* ==== FORM ==== */
.form-grid{display:grid;gap:20px;}
.form-block{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;}
.block-title{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.block-title span{font-size:16px;}
.frow{display:grid;gap:12px;margin-bottom:12px;}
.frow.c2{grid-template-columns:1fr 1fr;}
.frow.c3{grid-template-columns:1fr 1fr 1fr;}
.frow.c4{grid-template-columns:1fr 1fr 1fr 1fr;}
.frow:last-child{margin-bottom:0;}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:500;letter-spacing:.03em;}
.field input,.field select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;transition:border-color .2s;}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent);}
.field select option{background:var(--bg2);}
.result-box{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.result-row:last-child{border-bottom:none;padding-top:12px;}
.result-row .rl{color:var(--muted);}
.result-total{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.result-total.pos{color:var(--green);}
.result-total.neg{color:var(--red);}
.btn{padding:9px 18px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--text);transition:all .15s;}
.btn:hover{background:var(--bg2);border-color:var(--muted);}
.btn-accent{background:var(--accent);color:#fff;border-color:transparent;font-weight:700;}
.btn-accent:hover{background:#ea6c0a;}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px;}
.btn-del{border-color:rgba(248,113,113,.3);color:var(--red);}
.btn-del:hover{background:rgba(248,113,113,.1);}
.actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.msg{text-align:right;font-size:12px;color:var(--green);margin-top:6px;height:16px;}
.pos{color:var(--green);}
.neg{color:var(--red);}
.estado-sel{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;padding:4px 6px;font-family:'DM Sans',sans-serif;}
.model-name{font-weight:500;font-size:13px;}
.model-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:12px;}
.loading-overlay.hidden{display:none;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
